<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Weather Forecast</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        :root {
            --bg-color: #0a0b10; --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1); --text-main: #e0e0e0; --text-dim: #a0a0a0;
            --temp: #ff4d4d; --precip: #00f2ff; --instability: #ffcc00;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); text-align: center; margin: 0; padding: 0; }
        nav { background: rgba(10, 11, 16, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--glass-border); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 800; font-size: 1.4em; letter-spacing: 2px; color: #fff; text-transform: uppercase; }
        .logo span { color: var(--temp); }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        h1 { font-weight: 800; font-size: 3em; margin: 0; }
        .subtitle { color: var(--text-dim); margin-bottom: 60px; font-size: 1.2em; }
        .section-container { margin-bottom: 80px; text-align: left; }
        .section-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .section-header h2 { margin: 0; font-size: 1.8em; font-weight: 600; }
        .line { height: 2px; flex-grow: 1; background: linear-gradient(to right, var(--glass-border), transparent); }
        .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        @media (max-width: 1100px) { .row { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .row { grid-template-columns: 1fr; } }
        .card { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 15px; border-radius: 20px; transition: 0.4s; }
        .card:hover { transform: translateY(-10px); background: rgba(255,255,255,0.07); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .card img { width: 100%; border-radius: 12px; display: block; }
        .time-label { font-size: 0.75em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; display: block; text-align: left; font-weight: 600; }
        .t-text { color: var(--temp); } .p-text { color: var(--precip); } .i-text { color: var(--instability); }
        .t-border { border-left: 4px solid var(--temp); } .p-border { border-left: 4px solid var(--precip); } .i-border { border-left: 4px solid var(--instability); }
        .footer { margin-top: 100px; padding: 40px; font-size: 0.8em; color: var(--text-dim); text-align: center; border-top: 1px solid var(--glass-border); }
    </style>
</head>
<body>
    <nav><div class="logo">INDIA<span>SYNC</span></div></nav>
    <div class="container">
        <h1>India Weather Forecast</h1>
        <p class="subtitle">High-Resolution IFS Forecast Analysis</p>

        <!-- TEMPERATURE -->
        <div class="section-container">
            <div class="section-header"><h2 class="t-text">Temperature</h2><div class="line"></div></div>
            <div class="row">
                <div class="card t-border"><span class="time-label">+6h</span><img src="plot_2t_6.png?v=1"></div>
                <div class="card t-border"><span class="time-label">+12h</span><img src="plot_2t_12.png?v=1"></div>
                <div class="card t-border"><span class="time-label">+5 Days</span><img src="plot_2t_120.png?v=1"></div>
                <div class="card t-border"><span class="time-label">+10 Days</span><img src="plot_2t_240.png?v=1"></div>
            </div>
        </div>

        <!-- PRECIPITATION -->
        <div class="section-container">
            <div class="section-header"><h2 class="p-text">Precipitation</h2><div class="line"></div></div>
            <div class="row">
                <div class="card p-border"><span class="time-label">+6h</span><img src="plot_tp_6.png?v=1"></div>
                <div class="card p-border"><span class="time-label">+12h</span><img src="plot_tp_12.png?v=1"></div>
                <div class="card p-border"><span class="time-label">+5 Days</span><img src="plot_tp_120.png?v=1"></div>
                <div class="card p-border"><span class="time-label">+10 Days</span><img src="plot_tp_240.png?v=1"></div>
            </div>
        </div>

        <!-- MUCAPE -->
        <div class="section-container">
            <div class="section-header"><h2 class="i-text">MUCAPE (Storm Risk)</h2><div class="line"></div></div>
            <div class="row">
                <div class="card i-border"><span class="time-label">+6h</span><img src="plot_mucape_6.png?v=1"></div>
                <div class="card i-border"><span class="time-label">+12h</span><img src="plot_mucape_12.png?v=1"></div>
                <div class="card i-border"><span class="time-label">+5 Days</span><img src="plot_mucape_120.png?v=1"></div>
                <div class="card i-border"><span class="time-label">+10 Days</span><img src="plot_mucape_240.png?v=1"></div>
            </div>
        </div>

        <div class="footer">WEATHER FORECAST &copy; 2026 | Data Source: ECMWF IFS Open Data Portal | Managed by Unashish[RIKEN]</div>
    </div>
</body>
</html>
