<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Weather Forecast</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-color: #f8f9fa; 
            color: #333; 
            margin: 0; 
            padding: 0; 
            text-align: center;
        }

        .header { 
            background: #ffffff; 
            padding: 30px 20px; 
            border-bottom: 1px solid #ddd; 
            margin-bottom: 40px;
        }

        h1 { font-size: 24px; margin: 0; color: #111; }
        p { font-size: 14px; color: #666; margin-top: 5px; }

        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 0 20px 60px; 
        }

        .section-title { 
            text-align: left; 
            font-size: 18px; 
            font-weight: 600; 
            margin: 30px 0 15px; 
            padding-left: 10px;
            border-left: 4px solid #007bff;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; 
            margin-bottom: 40px;
        }

        @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }

        .card { 
            background: white; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            padding: 10px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .card-label { 
            font-size: 12px; 
            font-weight: 600; 
            color: #888; 
            margin-bottom: 8px; 
            display: block;
            text-align: left;
        }

        .card img { 
            width: 100%; 
            height: auto; 
            border-radius: 4px; 
            display: block;
        }

        .footer { 
            margin-top: 50px; 
            font-size: 12px; 
            color: #aaa; 
            padding-bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Japan Regional Weather Forecast</h1>
        <p>Automated IFS Data Analysis</p>
    </div>

    <div class="container">

        <!-- TEMPERATURE SECTION -->
        <div class="section-title">🌡️ Temperature (°C)</div>
        <div class="grid">
            <div class="card">
                <span class="card-label">6 Hours</span>
                <img src="plot_2t_6.png?v=1" alt="6h">
            </div>
            <div class="card">
                <span class="card-label">12 Hours</span>
                <img src="plot_2t_12.png?v=1" alt="12h">
            </div>
            <div class="card">
                <span class="card-label">5 Days</span>
                <img src="plot_2t_120.png?v=1" alt="5d">
            </div>
            <div class="card">
                <span class="card-label">10 Days</span>
                <img src="plot_2t_240.png?v=1" alt="10d">
            </div>
        </div>

        <!-- PRECIPITATION SECTION -->
        <div class="section-title">🌧️ Total Precipitation (mm)</div>
        <div class="grid">
            <div class="card">
                <span class="card-label">6 Hours</span>
                <img src="plot_tp_6.png?v=1" alt="6h">
            </div>
            <div class="card">
                <span class="card-label">12 Hours</span>
                <img src="plot_tp_12.png?v=1" alt="12h">
            </div>
            <div class="card">
                <span class="card-label">5 Days</span>
                <img src="plot_tp_120.png?v=1" alt="5d">
            </div>
            <div class="card">
                <span class="card-label">10 Days</span>
                <img src="plot_tp_240.png?v=1" alt="10d">
            </div>
        </div>

    </div>

    <div class="footer">
        Data source: ECMWF IFS Open Data Portal | Updated automatically via GitHub Actions managed by Unashish [RIKEN]
    </div>

</body>
</html>
