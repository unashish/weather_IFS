<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IFS Weather Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; text-align: center; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { margin-bottom: 5px; color: #e94560; }
        h2 { background: #16213e; padding: 10px; border-radius: 5px; text-align: left; margin-top: 40px; }
        .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .card { background: #0f3460; padding: 5px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        img { width: 100%; height: auto; border-radius: 5px; display: block; }
        .hero { background: white; padding: 15px; border-radius: 12px; margin-bottom: 30px; }
        .hero img { max-width: 100%; border-radius: 8px; }
        .footer { margin-top: 50px; font-size: 0.8em; color: #533483; }
    </style>
</head>
<body>

    <div class="container">
        <h1>IFS Regional Forecast</h1>
        <p>Japan Region | Automated Daily Update</p>

        <!-- ANIMATION SECTION -->
        <div class="hero">
            <h2 style="background:transparent; border:none; text-align:center;">✨ Temperature Evolution (GIF)</h2>
            <img src="weather_animation.gif?v=1" alt="Weather Animation Loading...">
        </div>

        <!-- TEMPERATURE ROW -->
        <h2>🌡️ Temperature (°C)</h2>
        <div class="row">
            <div class="card"><img src="plot_2t_6.png?v=1"></div>
            <div class="card"><img src="plot_2t_12.png?v=1"></div>
            <div class="card"><img src="plot_2t_120.png?v=1"></div>
            <div class="card"><img src="plot_2t_240.png?v=1"></div>
        </div>

        <!-- PRESSURE ROW -->
        <h2>⏲️ Surface Pressure (hPa)</h2>
        <div class="row">
            <div class="card"><img src="plot_sp_6.png?v=1"></div>
            <div class="card"><img src="plot_sp_12.png?v=1"></div>
            <div class="card"><img src="plot_sp_120.png?v=1"></div>
            <div class="card"><img src="plot_sp_240.png?v=1"></div>
        </div>

        <!-- PRECIPITATION ROW -->
        <h2>🌧️ Total Precipitation (mm)</h2>
        <div class="row">
            <div class="card"><img src="plot_tp_6.png?v=1"></div>
            <div class="card"><img src="plot_tp_12.png?v=1"></div>
            <div class="card"><img src="plot_tp_120.png?v=1"></div>
            <div class="card"><img src="plot_tp_240.png?v=1"></div>
        </div>

        <div class="footer">
            Data Source: ECMWF IFS | Automated Pipeline
        </div>
    </div>

</body>
</html>
