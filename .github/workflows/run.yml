name: Update Weather Plot

on:
  schedule:
    - cron: '0 0,12 * * *' # Runs twice a day
  workflow_dispatch:       # Allows you to run it manually via a button

permissions:
  contents: write          # This is CRITICAL so the robot can upload your images

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes0 libgeos-dev libproj-dev proj-bin
          
      - name: Install Python Libraries
        run: |
          pip install xarray matplotlib cartopy cfgrib ecmwf-opendata numpy imageio
          
      - name: Run the Python Script
        run: python ifs_code.py  # <--- IMPORTANT: Ensure this matches your filename!
        
      - name: Commit and Push new images
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add .
          git commit -m "Automated weather plot update" || echo "No changes to commit"
          git push
