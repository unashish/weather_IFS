name: Update Weather Plot

on:
  schedule:
    # This runs automatically every day at 00:00 and 12:00 UTC 
    # (which is 9:00 AM and 9:00 PM Japan Standard Time)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # This adds the "Run workflow" button for manual updates

permissions:
  contents: write # Critical: Allows the robot to upload the images to your repo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        # These system libraries are REQUIRED for cartopy and cfgrib to work on Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes0 libgeos-dev libproj-dev proj-bin

      - name: Install Python Libraries
        run: |
          pip install xarray matplotlib cartopy cfgrib ecmwf-opendata numpy

      - name: Run Python Script
        # Ensure your python file is named exactly 'ifs_code.py' in your repository
        run: python ifs_code.py

      - name: Commit and Push Images
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add *.png
          git commit -m "Automated weather plot update" || echo "No changes to commit"
          git push
